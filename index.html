<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraceTree</title>
  <!-- Include Treeflex CSS for simple tree styling -->
  <link rel="stylesheet" href="https://unpkg.com/treeflex/dist/css/treeflex.css">
  <style>
    /* Basic theme variables */
    :root{
      --bg:#f7f7f3;
      --paper:#ffffff;
      --text:#20241f;
      --muted:#73786f;
      --line:#cfd6cc;
      --green:#2f8f5b;
      --gray:#9a9a9a;
      --red:#c9483b;
      --dark:#1f2522;
      --soft:#eef1eb;
      --shadow:0 12px 30px rgba(0,0,0,0.06);
      --radius:18px;
    }
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
    }
    a{
      color:inherit;
      text-decoration:none;
    }
    button{
      border:none;
      background:var(--dark);
      color:white;
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
      font-size:14px;
      transition:background 0.2s;
    }
    button:hover{
      background:var(--green);
    }
    button.secondary{
      background:var(--soft);
      color:var(--dark);
    }
    button.danger{
      background:var(--red);
    }
    button.small{
      padding:8px 13px;
      font-size:13px;
    }
    /* Navigation bar */
    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(247,247,243,0.95);
      border-bottom:1px solid #e4e8df;
      backdrop-filter:blur(6px);
    }
    .navbar .inner{
      max-width:1180px;
      margin:0 auto;
      padding:16px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .logo{
      font-weight:700;
      font-size:20px;
    }
    .search-wrapper{
      position:relative;
      width:100%;
      max-width:480px;
    }
    .search-wrapper input{
      width:100%;
      padding:10px 14px;
      border:1px solid #d8ddd4;
      border-radius:14px;
      font-size:14px;
      background:white;
    }
    .search-results{
      position:absolute;
      left:0;
      right:0;
      top:100%;
      background:white;
      border:1px solid #d8ddd4;
      border-radius:14px;
      box-shadow:var(--shadow);
      max-height:300px;
      overflow-y:auto;
      display:none;
      z-index:100;
    }
    .search-results li{
      padding:8px 12px;
      cursor:pointer;
      border-bottom:1px solid #f0f2f0;
    }
    .search-results li:last-child{
      border-bottom:none;
    }
    .search-results li:hover{
      background:#f7f9f7;
    }
    /* Main container */
    .container{
      max-width:1180px;
      margin:0 auto;
      padding:24px;
    }
    .tree-area{
      margin-top:32px;
      min-height:320px;
      position:relative;
    }
    /* Default sample tree placeholder */
    .placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      height:320px;
      color:var(--muted);
      font-style:italic;
      border:1px dashed #ccd1c8;
      border-radius:var(--radius);
      background:var(--paper);
    }
    /* Cards for forms */
    .forms{
      margin-top:32px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }
    .form-card{
      background:var(--paper);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid #e8ece4;
      padding:24px;
    }
    .form-card h3{
      margin-bottom:10px;
      font-size:20px;
    }
    .form-card p{
      margin-bottom:14px;
      color:var(--muted);
      font-size:14px;
    }
    .form-card input,
    .form-card textarea{
      width:100%;
      padding:10px 12px;
      border:1px solid #d8ddd4;
      border-radius:12px;
      font-size:14px;
      margin-bottom:10px;
      background:white;
    }
    .form-card textarea{
      resize:vertical;
      min-height:72px;
    }
    .status-msg{
      margin-top:8px;
      font-size:13px;
      color:var(--red);
    }
    /* Treeflex override for spacing */
    .tf-tree{
      margin:0 auto;
      padding:20px 0;
      width:100%;
      overflow-x:auto;
      text-align:center;
    }
    .tf-tree ul{
      padding-top:20px;
    }
    .tf-tree li{
      padding:10px;
      position:relative;
    }
    .tf-tree .tf-nc{
      position:relative;
      padding:6px 10px;
      display:inline-block;
      border-radius:8px;
      background:#eef1eb;
      color:var(--dark);
      font-size:14px;
      cursor:pointer;
      user-select:none;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }
    .tf-tree .tf-nc.root{
      background:var(--green);
      color:white;
    }
    .tf-tree .tf-nc.report{
      background:var(--gray);
      color:white;
    }
    .tf-tree .vote-count{
      font-size:12px;
      margin-left:6px;
    }
    /* Popup for node actions */
    .node-popup{
      position:absolute;
      min-width:160px;
      background:white;
      border:1px solid #d8ddd4;
      box-shadow:var(--shadow);
      border-radius:12px;
      padding:10px;
      z-index:1000;
      display:none;
    }
    .node-popup button{
      margin:4px 0;
      width:100%;
      padding:8px 10px;
      font-size:14px;
    }
    .node-popup .cancel{
      background:#f0f2f0;
      color:var(--dark);
    }
    /* Responsive adjustments */
    @media(max-width:860px){
      .forms{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation bar with search -->
  <header class="navbar">
    <div class="inner">
      <div class="logo">TraceTree</div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search existing trees…" autocomplete="off">
        <ul class="search-results" id="searchResults"></ul>
      </div>
    </div>
  </header>
  <!-- Main content container -->
  <div class="container">
    <!-- Tree display area -->
    <div id="treeArea" class="tree-area">
      <!-- Placeholder sample tree guidance when no selection -->
      <div id="placeholder" class="placeholder">Use the search above or create a new tree.</div>
    </div>
    <!-- Forms for creating root and reporting piracy -->
    <div class="forms">
      <!-- Create Root Form -->
      <div class="form-card">
        <h3>Create Root</h3>
        <p>Register a unique piece of content to start a tracing tree.</p>
        <input type="text" id="rootTitle" placeholder="Title of the work">
        <input type="url" id="rootLink" placeholder="Link to the original work">
        <input type="text" id="rootCreator" placeholder="Original content creator ID">
        <textarea id="rootFingerprint" placeholder="Optional timestamp / fingerprint / unique marker"></textarea>
        <button onclick="handleCreateRoot()">Create Root</button>
        <div id="rootStatus" class="status-msg"></div>
      </div>
      <!-- Report Pirating Form -->
      <div class="form-card">
        <h3>Report Pirating</h3>
        <p>Report a suspected pirated copy; the report will create or extend a tracing tree.</p>
        <input type="text" id="reportTitle" placeholder="Original work title">
        <input type="url" id="reportLink" placeholder="Original work link or identifier">
        <input type="text" id="reportCreator" placeholder="Original content creator ID (optional)">
        <input type="text" id="reportSuspect" placeholder="Suspect ID / suspected infringer">
        <input type="url" id="reportPirateLink" placeholder="Link to suspected pirated content">
        <textarea id="reportNote" placeholder="Notes: describe suspect, pirated content, and details"></textarea>
        <button onclick="handleReportPirating()">Report Pirating</button>
        <div id="reportStatus" class="status-msg"></div>
      </div>
    </div>
  </div>
  <!-- Popup menu for node actions -->
  <div id="nodePopup" class="node-popup">
    <button id="upvoteBtn">Upvote</button>
    <button id="downvoteBtn">Downvote</button>
    <button id="addLeafBtn">Add Leaf</button>
    <button class="cancel" onclick="hideNodePopup()">Cancel</button>
  </div>
  <!-- Fuse.js for fuzzy searching -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  <script>
    /*
     * TraceTree interactive prototype
     *
     * This script enables users to create tracing trees for original works,
     * report suspected piracy, search existing trees, and interact with tree
     * nodes (upvote, downvote, add leaves). It uses Fuse.js to perform
     * fuzzy matching of titles and links to decide whether to add reports
     * to existing trees or create new ones. Data is stored in
     * localStorage for client-side persistence.
     */
    // Storage key for persistence
    const STORAGE_KEY = 'tracetree-trees-v3';
    // In-memory state
    let state = { trees: [] };
    let fuse;          // Fuse.js instance for fuzzy search
    let selectedTreeId = null;  // Currently selected tree ID
    let popupContext = null;    // Context for node popup (treeId and nodePath)
    // Utility: generate a simple unique ID
    function makeId() {
      return 'id_' + Math.random().toString(36).substring(2,10) + '_' + Date.now().toString(36);
    }
    // Clean and trim text
    function clean(value) {
      return String(value || '').trim();
    }
    // Validate required string
    function isRequired(value) {
      return clean(value).length > 0;
    }
    // Load state from localStorage
    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed && Array.isArray(parsed.trees)) {
            state.trees = parsed.trees;
          }
        } catch (err) {
          console.warn('Failed to parse saved state', err);
          localStorage.removeItem(STORAGE_KEY);
        }
      }
      updateFuseIndex();
    }
    // Save state to localStorage
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    // Build or rebuild Fuse.js index for existing trees
    function updateFuseIndex() {
      if (state.trees.length > 0) {
        fuse = new Fuse(state.trees, {
          keys: ['title', 'originalLink', 'creator', 'fingerprint'],
          includeScore: true,
          threshold: 0.4, // 0 = perfect match, 1 = match all
          ignoreLocation: true
        });
      } else {
        fuse = null;
      }
    }
    // Create a new root tree
    function handleCreateRoot() {
      const title = clean(document.getElementById('rootTitle').value);
      const link = clean(document.getElementById('rootLink').value);
      const creator = clean(document.getElementById('rootCreator').value);
      const fingerprint = clean(document.getElementById('rootFingerprint').value);
      const statusEl = document.getElementById('rootStatus');
      statusEl.textContent = '';
      if (!isRequired(title) || !isRequired(link) || !isRequired(creator)) {
        statusEl.textContent = 'Please provide title, link, and creator ID.';
        return;
      }
      // Search for approximate existing tree
      let matched = null;
      if (fuse) {
        const results = fuse.search(title + ' ' + link);
        if (results.length > 0 && results[0].score <= 0.3) {
          matched = results[0].item;
        }
      }
      if (matched) {
        // If match found, inform user and select existing tree
        statusEl.textContent = 'A similar tree already exists. Adding root aborted; selecting existing tree.';
        selectedTreeId = matched.id;
        renderTreeArea();
        return;
      }
      // Create new tree
      const newTree = {
        id: makeId(),
        title,
        originalLink: link,
        creator,
        fingerprint,
        createdAt: today(),
        votes: 0,
        children: []
      };
      state.trees.unshift(newTree);
      saveState();
      updateFuseIndex();
      statusEl.textContent = 'Root created successfully!';
      // Reset form inputs
      document.getElementById('rootTitle').value = '';
      document.getElementById('rootLink').value = '';
      document.getElementById('rootCreator').value = '';
      document.getElementById('rootFingerprint').value = '';
      selectedTreeId = newTree.id;
      renderTreeArea();
    }
    // Helper: get current date as YYYY-MM-DD
    function today() {
      return new Date().toISOString().slice(0,10);
    }
    // Handle reporting pirating
    function handleReportPirating() {
      const origTitle = clean(document.getElementById('reportTitle').value);
      const origLink = clean(document.getElementById('reportLink').value);
      const creator = clean(document.getElementById('reportCreator').value) || 'Unknown creator';
      const suspect = clean(document.getElementById('reportSuspect').value);
      const pirateLink = clean(document.getElementById('reportPirateLink').value);
      const note = clean(document.getElementById('reportNote').value);
      const statusEl = document.getElementById('reportStatus');
      statusEl.textContent = '';
      if (!isRequired(origTitle) || !isRequired(origLink) || !isRequired(suspect) || !isRequired(pirateLink)) {
        statusEl.textContent = 'Please fill in original title, original link, suspect ID, and pirated link.';
        return;
      }
      // Determine if there is an existing tree for the content
      let targetTree = null;
      if (fuse) {
        const results = fuse.search(origTitle + ' ' + origLink);
        if (results.length > 0 && results[0].score <= 0.3) {
          targetTree = results[0].item;
        }
      }
      let newCreated = false;
      if (!targetTree) {
        // Create new tree automatically
        targetTree = {
          id: makeId(),
          title: origTitle,
          originalLink: origLink,
          creator,
          fingerprint: 'Created from report.',
          createdAt: today(),
          votes: 0,
          children: []
        };
        state.trees.unshift(targetTree);
        newCreated = true;
      }
      // Add report as a child of root
      const reportNode = {
        id: makeId(),
        type: 'report',
        suspect,
        pirateLink,
        note: note || 'No notes provided.',
        votes: 0,
        children: []
      };
      targetTree.children.push(reportNode);
      saveState();
      updateFuseIndex();
      statusEl.textContent = newCreated
        ? 'No matching tree found; created new tree and added report.'
        : 'Matching tree found; report added to existing tree.';
      // Reset inputs
      document.getElementById('reportTitle').value = '';
      document.getElementById('reportLink').value = '';
      document.getElementById('reportCreator').value = '';
      document.getElementById('reportSuspect').value = '';
      document.getElementById('reportPirateLink').value = '';
      document.getElementById('reportNote').value = '';
      selectedTreeId = targetTree.id;
      renderTreeArea();
    }
    // Render the tree area: show placeholder, sample tree, or selected tree
    function renderTreeArea() {
      const treeArea = document.getElementById('treeArea');
      const placeholder = document.getElementById('placeholder');
      treeArea.innerHTML = '';
      // Clear any popups
      hideNodePopup();
      if (!selectedTreeId) {
        // Show placeholder guidance
        treeArea.appendChild(placeholder);
        placeholder.style.display = 'flex';
        return;
      }
      placeholder.style.display = 'none';
      const tree = state.trees.find(t => t.id === selectedTreeId);
      if (!tree) {
        // If tree not found, fallback to placeholder
        selectedTreeId = null;
        treeArea.appendChild(placeholder);
        placeholder.style.display = 'flex';
        return;
      }
      // Build HTML for tree using Treeflex
      const html = buildTreeHTML(tree);
      treeArea.innerHTML = html;
      // Reattach event listeners for node clicks after rendering
      attachNodeClickHandlers();
    }
    // Build HTML for a tree using nested lists
    function buildTreeHTML(tree) {
      // Root node wrapper
      let html = '<div class="tf-tree"><ul>';
      html += buildNodeHTML({
        id: tree.id,
        type: 'root',
        label: tree.title,
        votes: tree.votes,
        children: tree.children
      }, '');
      html += '</ul></div>';
      return html;
    }
    // Recursively build HTML for each node
    function buildNodeHTML(node, path) {
      const nodeId = node.id;
      const nodeType = node.type || 'root';
      let displayText;
      if (nodeType === 'root') {
        displayText = escapeHtml(node.label);
      } else {
        // Display suspect ID as label for report nodes
        displayText = escapeHtml(node.suspect);
      }
      const vote = node.votes || 0;
      // Compose the HTML for this node
      let html = '<li>';
      html += `<span class="tf-nc tree-node ${nodeType}" data-tree-id="${selectedTreeId}" data-path="${path}" data-node-id="${nodeId}" data-type="${nodeType}">` +
              `${displayText}<span class="vote-count">(${vote})</span></span>`;
      // Recursively build children if any
      if (node.children && node.children.length > 0) {
        html += '<ul>';
        node.children.forEach((child, index) => {
          const childPath = path ? \`\${path},\${index}\` : String(index);
          html += buildNodeHTML({
            id: child.id,
            type: 'report',
            suspect: child.suspect,
            pirateLink: child.pirateLink,
            note: child.note,
            votes: child.votes,
            children: child.children || []
          }, childPath);
        });
        html += '</ul>';
      }
      html += '</li>';
      return html;
    }
    // Escape HTML entities to prevent injection
    function escapeHtml(str) {
      return String(str).replace(/[&<>\"']/g, function(match) {
        switch(match) {
          case '&': return '&amp;';
          case '<': return '&lt;';
          case '>': return '&gt;';
          case '\"': return '&quot;';
          case "'": return '&#39;';
          default: return match;
        }
      });
    }
    // Attach click handlers to all tree nodes
    function attachNodeClickHandlers() {
      const nodes = document.querySelectorAll('.tree-node');
      nodes.forEach(node => {
        node.addEventListener('click', function(event) {
          event.stopPropagation();
          const treeId = node.getAttribute('data-tree-id');
          const path = node.getAttribute('data-path');
          const nodeType = node.getAttribute('data-type');
          // Show popup menu near the clicked node
          showNodePopup(event, treeId, path, nodeType);
        });
      });
    }
    // Show popup menu for node actions
    function showNodePopup(event, treeId, path, nodeType) {
      popupContext = { treeId, path, type: nodeType };
      const popup = document.getElementById('nodePopup');
      popup.style.display = 'block';
      // Position near the clicked node
      const rect = event.target.getBoundingClientRect();
      const scrollY = window.scrollY || window.pageYOffset;
      const scrollX = window.scrollX || window.pageXOffset;
      // Adjust the popup to not overflow viewport
      const top = rect.top + scrollY + rect.height + 6;
      let left = rect.left + scrollX;
      // Ensure popup stays within viewport horizontally
      const popupWidth = 200;
      if (left + popupWidth > window.innerWidth) {
        left = window.innerWidth - popupWidth - 20;
      }
      popup.style.top = top + 'px';
      popup.style.left = left + 'px';
    }
    // Hide popup menu
    function hideNodePopup() {
      const popup = document.getElementById('nodePopup');
      popup.style.display = 'none';
      popupContext = null;
    }
    // Upvote selected node
    document.getElementById('upvoteBtn').addEventListener('click', function() {
      if (!popupContext) return;
      modifyVotes(popupContext.treeId, popupContext.path, 1);
      hideNodePopup();
    });
    // Downvote selected node
    document.getElementById('downvoteBtn').addEventListener('click', function() {
      if (!popupContext) return;
      modifyVotes(popupContext.treeId, popupContext.path, -1);
      hideNodePopup();
    });
    // Add new leaf to selected node
    document.getElementById('addLeafBtn').addEventListener('click', function() {
      if (!popupContext) return;
      const treeId = popupContext.treeId;
      const path = popupContext.path;
      // Ask for suspect ID, link, and note via prompt
      const suspect = prompt('Enter suspect ID:');
      if (!suspect) return;
      const pirateLink = prompt('Enter link to suspected pirated content:');
      if (!pirateLink) return;
      const note = prompt('Enter a note (optional):') || '';
      addLeaf(treeId, path, suspect, pirateLink, note);
      hideNodePopup();
    });
    // Modify votes on a node by delta (positive or negative)
    function modifyVotes(treeId, path, delta) {
      const tree = state.trees.find(t => t.id === treeId);
      if (!tree) return;
      let node = tree;
      if (path !== '') {
        const parts = path.split(',');
        for (const idx of parts) {
          node = node.children[parseInt(idx)];
          if (!node) return;
        }
      }
      if (!node.votes) node.votes = 0;
      node.votes = Math.max(0, node.votes + delta);
      saveState();
      renderTreeArea();
    }
    // Add a new leaf (report) to a node
    function addLeaf(treeId, path, suspect, pirateLink, note) {
      const tree = state.trees.find(t => t.id === treeId);
      if (!tree) return;
      let node = tree;
      if (path !== '') {
        const parts = path.split(',');
        for (const idx of parts) {
          node = node.children[parseInt(idx)];
          if (!node) return;
        }
      }
      // Create and append new child
      const newChild = {
        id: makeId(),
        type: 'report',
        suspect,
        pirateLink,
        note: note || 'No note provided.',
        votes: 0,
        children: []
      };
      if (!node.children) node.children = [];
      node.children.push(newChild);
      saveState();
      renderTreeArea();
    }
    // Handle search input to show suggestions
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    searchInput.addEventListener('input', function() {
      const query = clean(searchInput.value);
      if (!query) {
        searchResults.style.display = 'none';
        searchResults.innerHTML = '';
        return;
      }
      if (!fuse) {
        searchResults.style.display = 'none';
        searchResults.innerHTML = '';
        return;
      }
      const results = fuse.search(query).map(r => r.item);
      if (results.length === 0) {
        searchResults.innerHTML = '<li>No matches found</li>';
        searchResults.style.display = 'block';
        return;
      }
      searchResults.innerHTML = '';
      results.slice(0, 10).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.title + ' (Creator: ' + item.creator + ')';
        li.addEventListener('click', () => {
          selectedTreeId = item.id;
          searchResults.style.display = 'none';
          searchResults.innerHTML = '';
          searchInput.value = '';
          renderTreeArea();
        });
        searchResults.appendChild(li);
      });
      searchResults.style.display = 'block';
    });
    // Hide search results on click outside
    document.addEventListener('click', function(event) {
      if (!searchResults.contains(event.target) && event.target !== searchInput) {
        searchResults.style.display = 'none';
      }
    });
    // Initial load
    loadState();
    renderTreeArea();
  </script>
</body>
</html>
